[project]
name = "lsob-contracts"
version = "0.1.0"
description = "Pydantic contracts shared across all LSOB packages"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_contracts"]
