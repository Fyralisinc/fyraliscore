[project]
name = "lsob-evaluator-l5"
version = "0.1.0"
description = "LSOB Layer 5 (temporal dynamics) evaluator"
requires-python = ">=3.12"
dependencies = [
    "lsob-contracts",
    "lsob-evaluator-l1",
    "lsob-evaluator-l3",
    "pydantic>=2.7",
    "numpy>=1.26",
    "matplotlib>=3.8",
    "typer>=0.12",
]

[project.scripts]
lsob-eval-l5 = "lsob_evaluator_l5.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_evaluator_l5"]
