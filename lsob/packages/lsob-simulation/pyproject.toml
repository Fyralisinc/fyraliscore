[project]
name = "lsob-simulation"
version = "0.1.0"
description = "LSOB tick-based simulation engine"
requires-python = ">=3.12"
dependencies = [
    "lsob-contracts",
    "pydantic>=2.7",
    "pyyaml>=6",
    "zstandard>=0.22",
    "typer>=0.12",
    "anthropic>=0.40",
]

[project.scripts]
lsob-simulation = "lsob_simulation.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_simulation"]
