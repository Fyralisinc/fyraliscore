[project]
name = "lsob-baselines"
version = "0.1.0"
description = "LSOB package: lsob-baselines — SystemUnderTest adapters"
requires-python = ">=3.12"
dependencies = [
    "lsob-contracts",
    "pydantic>=2.7",
    "numpy>=1.26",
    "pyyaml>=6",
    "typer>=0.12",
]

[project.optional-dependencies]
heavy = [
    "anthropic>=0.34",
    "langchain-core>=0.2",
    "llama-index-core>=0.10",
    "company-os",
]

[tool.uv.sources]
company-os = { path = "../../..", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_baselines"]
