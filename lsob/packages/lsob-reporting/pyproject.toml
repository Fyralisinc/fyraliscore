[project]
name = "lsob-reporting"
version = "0.1.0"
description = "LSOB package: lsob-reporting"
requires-python = ">=3.12"
dependencies = [
    "lsob-contracts",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_reporting"]
