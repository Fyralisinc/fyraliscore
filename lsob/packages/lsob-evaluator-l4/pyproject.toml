[project]
name = "lsob-evaluator-l4"
version = "0.1.0"
description = "LSOB package: lsob-evaluator-l4 — Layer 4 surfacing-quality evaluator"
requires-python = ">=3.12"
dependencies = [
    "lsob-contracts",
    "pydantic>=2.7",
    "numpy>=1.26",
    "typer>=0.12",
]

[project.scripts]
lsob-eval-l4 = "lsob_evaluator_l4.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lsob_evaluator_l4"]
