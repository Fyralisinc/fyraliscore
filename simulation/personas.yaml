# Simulation personas — Company OS dogfood cast.
#
# Each persona is authored content on the caller's side; when signals
# are injected via services/synthetic/core.inject() they flow through
# the uniform ingestion path and the persona's slack/github/email
# refs resolve to this UUID via actor_identity_mappings.
#
# UUIDs are stable so re-runs of the same scenario produce the same
# actor_id in the DB (after a reset.py purge). Re-rolling them is OK
# but then every fixture / scenario YAML needs regenerating.
#
# Voice hints are prompt snippets shown above the Slack-UI composer
# to remind Rachin how this persona sounds before they type. They are
# NOT consumed by any LLM — they are a UX aid only.

personas:
  - id: 11111111-aaaa-7000-8000-000000000001
    name: Alice Chen
    role: engineer
    title: Staff Engineer, Payments
    voice_style_notes: >-
      terse, engineering-focused, lowercase sentences, drops
      articles, signs off without punctuation. uses "lol" but
      never emoji. links PRs bare.
    typical_channels: [slack_eng, slack_payments, github, linear]
    slack_handle: alice
    github_handle: alice-dev
    email: alice@fyralis.internal

  - id: 11111111-aaaa-7000-8000-000000000002
